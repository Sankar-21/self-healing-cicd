name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t self-healing-cicd .

      - name: Notify on failure
        if: failure()
        run: echo "PIPELINE_FAILED=true" >> $GITHUB_ENV
