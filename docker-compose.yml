version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./scripts:/app/scripts

  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./dashboard:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    environment:
      - CI=false
    depends_on:
      - backend
